<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap');
    </style>
  </defs>

  <!-- Fondo red cherry -->
  <rect width="900" height="260" fill="#D20A2E"/>

  <!--
    Bubble con tail integrado — forma unificada estilo iMessage received.
    El tail nace del borde inferior-izquierdo y apunta hacia abajo,
    replicando el comportamiento real de iOS Messages.
  -->
  <path
    d="
      M 150 72
      H 756
      C 782 72 804 94 804 120
      V 152
      C 804 178 782 200 756 200
      H 164
      Q 140 200 126 214
      Q 116 224 106 234
      Q 108 218 106 200
      C 100 196 96 176 96 152
      V 120
      C 96 94 118 72 150 72
      Z
    "
    fill="#E9E9EB"
  />

  <!-- Texto Inter Bold -->
  <text
    x="450"
    y="136"
    font-family="'Inter', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
    font-size="30"
    font-weight="700"
    fill="#1C1C1E"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-0.4"
  >Bienvenido a MarnueLgh</text>

</svg>
